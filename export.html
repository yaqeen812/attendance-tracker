<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصف السادس - سجل الحضور</title>
    <link rel="stylesheet" href="school.css">
</head>
<body data-db-path="students/grade6">

    <div class="container">
        <h1>سجل حضور وغياب الطلاب</h1>

        <div class="top-row">
            <div class="add-student-area">
                <button type="button" class="add-btn" onclick="addNewStudent()">+</button>
                <div class="add-input">
                    <input type="text" id="newName" placeholder="إضافة اسم">
                </div>
            </div>

            <div class="search-area">
                <div id="todayDate" class="today-date" aria-label="تاريخ اليوم"></div>
                <div class="search-row">
                    <input type="text" id="searchBar" placeholder="بحث عن اسم">
                </div>
            </div>
        </div>

        <div class="page-layout">
            <main class="main">
                <table id="studentTable" class="students">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>الاسم</th>
                            <th>الحالة</th>
                            <th>عدد الأيام</th>
                            <th>حذف</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </main>

            <nav class="sidebar-nav" aria-label="القائمة الرئيسية">
                <ol>
                    <li><a href="sort.html">الصف الرابع</a></li>
                    <li><a href="absent.html">الصف الخامس</a></li>
                    <li><a href="export.html">الصف السادس</a></li>
                </ol>
            </nav>
        </div>

        <div class="controls">
            <button onclick="getSelected()" class="primary">إحصاء الغياب</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="table.js"></script>
</body>
</html>
