<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>تسجيل الدخول</title>
  <link rel="stylesheet" href="sign in.css">
</head>
<body>

  <h1>تسجيل الدخول</h1>

  <form id="loginForm">
    <label for="username">اسم المستخدم</label><br>
    <input type="text" id="username" name="username" placeholder="اكتب اسم المستخدم"><br><br>

    <label for="password">كلمة المرور</label><br>
    <input type="password" id="password" name="password" placeholder="اكتب كلمة المرور"><br><br>

    <button type="button" onclick="checkLogin()">تسجيل الدخول</button><br>
    <a href="#">نسيت كلمة المرور؟</a>

    <div style="margin-top:12px">
      <button id="googleSignIn" type="button">المتابعة مع جوجل</button>
    </div>
  </form>

  <p>ليس لديك حساب؟</p>
  <a href="signup.html">
    <button id="click" type="button" onclick="goToSignUp()">إنشاء حساب</button>
  </a>

  <!-- main script -->
  <script src="main.js"></script>

  <!-- Firebase Google sign-in (module). This script runs after the DOM so it can attach listeners safely. -->
 <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // TODO: replace this with your Firebase project's config
 const firebaseConfig = {
  apiKey: "AIzaSyAOHLtnXyqdugkZLnO9Tn2EsdQhOca7KfM",
  authDomain: "ono-e1fb6.firebaseapp.com",
  projectId: "ono-e1fb6",
  storageBucket: "ono-e1fb6.firebasestorage.app",
  messagingSenderId: "7867974746",
  appId: "1:7867974746:web:29693df25d3f04c5b3c463"
};
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  const btn = document.getElementById('googleSignIn');
  if (btn) {
    // optional: disable until SDK ready
    btn.disabled = false;
    btn.addEventListener('click', async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        // success: you can store user info or redirect
        alert('مرحباً ' + (user.displayName || user.email));
        window.location.href = 'school.html';
      } catch (err) {
        console.error('Google sign-in failed', err);
        alert('فشل تسجيل الدخول عبر Google');
      }
    });
  }

  // Optional: react to auth state changes
  onAuthStateChanged(auth, (user) => {
    if (user) {
      console.log('Logged in as', user.email);
    } else {
      console.log('Not logged in');
    }
  });
</script>

</body>
</html>
